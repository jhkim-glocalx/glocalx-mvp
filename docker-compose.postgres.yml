services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glocalx
      POSTGRES_PASSWORD: glocalx
      POSTGRES_USER: glocalx
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glocalx -d glocalx"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
